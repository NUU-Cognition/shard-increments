shard-spec: "0.1.0"
version: "0.1.0"
name: Increments
shorthand: inc
description: Track work using increment.stream.iteration versioning

install:
  - source: inst-inc-dashboard.md
    dest: Mesh/(Dashboard) Increments.md
    once: true
  - source: inst-inc-checkpoint_init.md
    dest: Mesh/Types/Increments/(Increment) 1.0.0 - Init.md
    once: true
  - source: inst-inc-adhoc_init.md
    dest: Mesh/Types/Increments/(Increment) 1.A.0 - Adhoc.md
    once: true

folders:
  - Mesh/Types/Increments/
  - Mesh/Archive/Increments/
