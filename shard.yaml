shard-spec: "0.1.0"
version: "0.3.0"
name: Increments
shorthand: inc
description: Group work into loops — open, close, checkpoint

install:
  - source: inst-inc-dashboard.md
    dest: Mesh/(Dashboard) Increments.md
    mode: once
  - source: inst-inc-checkpoint_init.md
    dest: Mesh/Increments/(Increment) 1.0 - Init.md
    mode: once
  - source: inst-inc-adhoc_init.md
    dest: Mesh/Increments/(Increment) 1.A - Adhoc.md
    mode: once

folders:
  - Mesh/Increments/
  - Mesh/Archive/Increments/
